name: Deploy to AWS EC2 via GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lionz-it/campus-pre-loved

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 

      - name: 3. Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: 4. Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login ke GHCR dari dalam EC2 (UBAH KE HURUF KECIL MANUAL)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u lionz-it --password-stdin
            
            # Tarik image yang sudah matang (UBAH KE HURUF KECIL MANUAL)
            docker pull ghcr.io/lionz-it/campus-pre-loved:latest
            
            # Jalankan migrasi database
            echo "Running database migrations..."
            docker run --rm \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ghcr.io/lionz-it/campus-pre-loved:latest \
              npx drizzle-kit migrate
            
            if [ $? -ne 0 ]; then
              echo "Migration failed, aborting deployment."
              exit 1
            fi
            
            # Hentikan container lama
            docker stop marketplace-web || true
            docker rm marketplace-web || true
            
            # Jalankan container baru dan SUNTIKKAN SEMUA ENV VARS yang krusial (UBAH KE HURUF KECIL MANUAL)
            docker run -d --name marketplace-web -p 80:3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AUTH_TRUST_HOST="true" \
              ghcr.io/lionz-it/campus-pre-loved:latest
            
            # Bersihkan sisa image lama
            docker image prune -f